<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box-01 {
            width: 200px;
            height: 100px;
            background-color: wheat;
            padding: 20px 40px 80px 100px;/*内边距默认顺序为顺时针*/

            border-left: 10px solid #000;
            border-right: 11px dashed #009b;
            border-bottom: 11px solid #a23030;
            border-top: 12px solid #111;
            /*
            border: 1px solid #000;实线
            border: 1px dashed #000;虚线
            border: 1px dotted #000;点线
            */
            margin: 0 auto;
        }
        .box-02{
            width: 90px;
            height: 90px;
            background-color: aqua;
            overflow: scroll;
        }
        .box-03{
           width: 90px;
            height: 90px;
            background-color: aquamarine;
            border-radius: 45px;
            overflow: scroll;
            box-shadow: 2px 4px 10px 1px rgba(0,0,0,0.5);
            
        }
    </style>
</head>
<body>
    <div class="box-01">
        div
    </div>
    <div class="box-02">
        1111111111111111111111111111111111111111111111111111111
        112121212121212123121
        131424231231231231
        123123123
        123123123121231239
        312312123123
    </div>
    <div class="box-03">
        边缘圆角
    </div>
</body>
</html>
