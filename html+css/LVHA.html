<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a:link/*before visited*/{
            color: black;
            font-size: 16px;
        }
        a:visited/*after visited*/{
            color: red;
            font-size: 16px;
        }
        a:hover/*mouse hovering*/{
            color: green;
            font-size: 16px;
        }
        a:active/*actived*/{
            color: purple;
            font-size: 16px;
        }
        
    </style>
</head>
<body>
    <a href="#" target="_blank">This is a hyperlink label for test...</a>
</body>
</html>
