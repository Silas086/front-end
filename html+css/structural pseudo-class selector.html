<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*结构伪类选择器*/
        li:first-child{
            color:aqua;
            background-color: aquamarine;
        }
        li:last-child{
            color:brown;
        }
        li:nth-child(3){
            color:antiquewhite;
        }
    </style>
</head>
<body>
    <ul>
        <li>li 1</li>
        <li>li 2</li>
        <li>li 3</li>
        <li>li 4</li>
    </ul>
</body>
</html>
