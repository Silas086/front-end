<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div p{
            color: blue;
            font-size: 100px;
        }
        div > span{
            color: red;
            font-size: 100px;
        }
        p.aaa{
            color: yellow;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div>
        <span>111</span>
        <p>1234</p>
        <p><span>666</span></p>
        <p class="aaa">sssss</p>
    </div>
</body>
</html>
